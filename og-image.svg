<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title description">
  <title id="title">Track — Track the work. Finish what you started.</title>
  <desc id="description">A black monochrome Track Open Graph card with an abstract sequence diagram of parallel work lanes, dependencies, checkpoints, and retry paths.</desc>

  <defs>
    <radialGradient id="field" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(998 240) rotate(137) scale(560 650)">
      <stop stop-color="#242424"/>
      <stop offset="0.46" stop-color="#111111"/>
      <stop offset="1" stop-color="#070707"/>
    </radialGradient>
    <linearGradient id="message" x1="790" y1="0" x2="1110" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F5F5F2" stop-opacity="0.08"/>
      <stop offset="0.55" stop-color="#F5F5F2" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#F5F5F2" stop-opacity="0.16"/>
    </linearGradient>
    <filter id="softGlow" x="-300%" y="-300%" width="600%" height="600%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <filter id="grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.86" numOctaves="3" seed="11" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.05"/>
      </feComponentTransfer>
    </filter>
    <style>
      .display {
        font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
        font-weight: 700;
        letter-spacing: -5px;
      }
      .mono {
        font-family: Menlo, Monaco, Consolas, monospace;
        font-weight: 700;
        letter-spacing: 2px;
      }
      .lifeline {
        stroke: #F5F5F2;
        stroke-opacity: 0.12;
        stroke-width: 1;
        stroke-dasharray: 2 8;
        stroke-linecap: round;
      }
      .flow {
        fill: none;
        stroke: url(#message);
        stroke-width: 1.4;
        stroke-dasharray: 1 7;
        stroke-linecap: round;
      }
      .arrow {
        fill: none;
        stroke: #F5F5F2;
        stroke-opacity: 0.5;
        stroke-width: 1;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
    </style>
  </defs>

  <rect width="1200" height="630" fill="#070707"/>
  <rect width="1200" height="630" fill="url(#field)"/>

  <g aria-hidden="true">
    <rect x="748" y="98" width="390" height="432" rx="58" fill="#0D0D0D" stroke="#F5F5F2" stroke-opacity="0.045"/>
    <rect x="770" y="120" width="346" height="388" rx="45" fill="none" stroke="#F5F5F2" stroke-opacity="0.025"/>

    <g>
      <rect x="785" y="142" width="42" height="18" rx="9" fill="#F5F5F2" fill-opacity="0.045" stroke="#F5F5F2" stroke-opacity="0.08"/>
      <rect x="879" y="142" width="42" height="18" rx="9" fill="#F5F5F2" fill-opacity="0.045" stroke="#F5F5F2" stroke-opacity="0.08"/>
      <rect x="973" y="142" width="42" height="18" rx="9" fill="#F5F5F2" fill-opacity="0.045" stroke="#F5F5F2" stroke-opacity="0.08"/>
      <rect x="1067" y="142" width="42" height="18" rx="9" fill="#F5F5F2" fill-opacity="0.045" stroke="#F5F5F2" stroke-opacity="0.08"/>

      <circle cx="806" cy="151" r="2.4" fill="#F5F5F2" fill-opacity="0.72"/>
      <circle cx="900" cy="151" r="2.4" fill="#F5F5F2" fill-opacity="0.48"/>
      <circle cx="994" cy="151" r="2.4" fill="#F5F5F2" fill-opacity="0.48"/>
      <circle cx="1088" cy="151" r="2.4" fill="#F5F5F2" fill-opacity="0.48"/>

      <path d="M806 166V482" class="lifeline"/>
      <path d="M900 166V482" class="lifeline"/>
      <path d="M994 166V482" class="lifeline"/>
      <path d="M1088 166V482" class="lifeline"/>

      <path d="M806 210H900" class="flow"/>
      <path d="M893 206L900 210L893 214" class="arrow"/>
      <circle cx="852" cy="210" r="2.8" fill="#F5F5F2" fill-opacity="0.92"/>
      <circle cx="852" cy="210" r="16" fill="#F5F5F2" fill-opacity="0.1" filter="url(#softGlow)"/>

      <rect x="790" y="244" width="313" height="118" rx="17" fill="#F5F5F2" fill-opacity="0.012" stroke="#F5F5F2" stroke-opacity="0.08" stroke-dasharray="3 7"/>
      <path d="M790 270H814V244" fill="none" stroke="#F5F5F2" stroke-opacity="0.14"/>

      <path d="M806 278H994" class="flow"/>
      <path d="M987 274L994 278L987 282" class="arrow"/>
      <circle cx="910" cy="278" r="2.4" fill="#F5F5F2" fill-opacity="0.58"/>

      <path d="M900 318H1088" class="flow"/>
      <path d="M1081 314L1088 318L1081 322" class="arrow"/>
      <circle cx="1018" cy="318" r="2.8" fill="#F5F5F2" fill-opacity="0.8"/>

      <path d="M994 344H1088" class="flow"/>
      <path d="M1081 340L1088 344L1081 348" class="arrow"/>
      <circle cx="1088" cy="344" r="8" fill="#0D0D0D" stroke="#F5F5F2" stroke-opacity="0.44"/>
      <circle cx="1088" cy="344" r="2.6" fill="#F5F5F2" fill-opacity="0.9"/>
      <circle cx="1088" cy="344" r="18" fill="#F5F5F2" fill-opacity="0.08" filter="url(#softGlow)"/>

      <path d="M1088 398H900" class="flow"/>
      <path d="M907 394L900 398L907 402" class="arrow"/>
      <circle cx="1012" cy="398" r="2.3" fill="#F5F5F2" fill-opacity="0.5"/>

      <path d="M994 430C1042 430 1042 468 994 468" class="flow"/>
      <path d="M1001 464L994 468L1001 472" class="arrow"/>
      <circle cx="1030" cy="449" r="2.4" fill="#F5F5F2" fill-opacity="0.66"/>

      <path d="M900 474H806" class="flow"/>
      <path d="M813 470L806 474L813 478" class="arrow"/>
      <circle cx="854" cy="474" r="2.4" fill="#F5F5F2" fill-opacity="0.74"/>
    </g>
  </g>

  <g aria-label="Track">
    <rect x="68" y="58" width="10" height="18" rx="1" fill="#F4F4F1"/>
    <rect x="84" y="48" width="10" height="28" rx="1" fill="#71716F"/>
    <rect x="100" y="62" width="10" height="14" rx="1" fill="#F4F4F1"/>
    <text x="128" y="74" fill="#F4F4F1" class="mono" font-size="17">TRACK</text>
  </g>

  <g aria-label="Track the work. Finish what you started.">
    <text x="68" y="227" fill="#F4F4F1" class="display" font-size="88">TRACK THE WORK.</text>
    <text x="68" y="353" fill="#F4F4F1" class="display" font-size="88">FINISH WHAT</text>
    <text x="68" y="445" fill="#F4F4F1" class="display" font-size="88">YOU STARTED.</text>
  </g>

  <g aria-hidden="true">
    <path d="M68 548H684" stroke="#F4F4F1" stroke-opacity="0.1"/>
    <circle cx="68" cy="548" r="3" fill="#F4F4F1" fill-opacity="0.7"/>
    <circle cx="684" cy="548" r="3" fill="#F4F4F1" fill-opacity="0.2"/>
  </g>

  <rect width="1200" height="630" filter="url(#grain)" opacity="0.3" pointer-events="none"/>
</svg>
