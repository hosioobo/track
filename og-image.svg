<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title description">
  <title id="title">Track — Track the work. Finish what you started.</title>
  <desc id="description">Track Open Graph card with the Track statement over three parallel work bars.</desc>
  <defs>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M 28 0 L 0 0 0 28" fill="none" stroke="#14292f" stroke-opacity="0.07" stroke-width="1"/>
    </pattern>
    <style>
      .display { font-family: "Arial Narrow", "Avenir Next Condensed", "Roboto Condensed", sans-serif; font-weight: 900; letter-spacing: -5px; }
    </style>
  </defs>

  <rect width="1200" height="630" fill="#dce7e5"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <g aria-hidden="true">
    <rect x="604" y="304" width="154" height="256" fill="#14292f" fill-opacity="0.07"/>
    <rect x="604" y="304" width="154" height="13" fill="#14292f"/>
    <rect x="790" y="56" width="154" height="504" fill="#d94b2b" fill-opacity="0.11"/>
    <rect x="790" y="56" width="154" height="13" fill="#d94b2b"/>
    <rect x="976" y="174" width="154" height="386" fill="#2949ba" fill-opacity="0.09"/>
    <rect x="976" y="174" width="154" height="13" fill="#2949ba"/>
  </g>

  <g aria-label="Track the work. Finish what you started.">
    <text x="68" y="166" fill="#14292f" class="display" font-size="112">TRACK THE</text>
    <text x="68" y="262" fill="#14292f" class="display" font-size="112">WORK.</text>
    <text x="68" y="386" fill="#d94b2b" class="display" font-size="112">FINISH WHAT</text>
    <text x="68" y="482" fill="#d94b2b" class="display" font-size="112">YOU STARTED.</text>
  </g>
</svg>
